<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d2840"/>
      <stop offset="100%" stop-color="#1a3a5e"/>
    </linearGradient>
    <linearGradient id="spectrum" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2d1b4e"/>
      <stop offset="15%" stop-color="#8b1a1a"/>
      <stop offset="30%" stop-color="#e07030"/>
      <stop offset="50%" stop-color="#e0a830"/>
      <stop offset="70%" stop-color="#30a898"/>
      <stop offset="85%" stop-color="#285e8e"/>
      <stop offset="100%" stop-color="#1a2e4a"/>
    </linearGradient>
    <linearGradient id="glow1" x1="0.5" y1="0" x2="0.5" y2="1" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#e07030" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#e07030" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="glow2" x1="0.5" y1="1" x2="0.5" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#18bc9c" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#18bc9c" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Ambient glows -->
  <ellipse cx="900" cy="150" rx="400" ry="300" fill="url(#glow1)"/>
  <ellipse cx="300" cy="500" rx="350" ry="250" fill="url(#glow2)"/>

  <!-- Spectrum bar -->
  <rect x="80" y="400" width="1040" height="24" rx="12" fill="url(#spectrum)" opacity="0.7"/>

  <!-- Marker: classification window -->
  <rect x="80" y="396" width="208" height="32" rx="4" fill="none" stroke="white" stroke-width="1.5" opacity="0.6"/>
  <text x="184" y="450" text-anchor="middle" fill="white" opacity="0.5" font-family="monospace" font-size="11">900–1060 nm</text>

  <!-- Marker: ABI window -->
  <rect x="768" y="396" width="52" height="32" rx="4" fill="none" stroke="#18bc9c" stroke-width="1.5" opacity="0.7"/>
  <text x="794" y="450" text-anchor="middle" fill="#18bc9c" opacity="0.6" font-family="monospace" font-size="11">1429–1463 nm</text>

  <!-- Tick labels -->
  <text x="80" y="475" fill="white" opacity="0.3" font-family="monospace" font-size="10">900</text>
  <text x="340" y="475" fill="white" opacity="0.3" font-family="monospace" font-size="10">1100</text>
  <text x="600" y="475" fill="white" opacity="0.3" font-family="monospace" font-size="10">1300</text>
  <text x="860" y="475" fill="white" opacity="0.3" font-family="monospace" font-size="10">1500</text>
  <text x="1090" y="475" fill="white" opacity="0.3" font-family="monospace" font-size="10">1700 nm</text>

  <!-- Simulated spectral curve -->
  <path d="M80,340 Q150,335 200,320 Q280,290 340,260 Q400,235 440,230 Q500,228 540,240 Q600,260 650,290 Q700,310 740,325 Q800,340 860,338 Q920,335 960,330 Q1020,320 1060,315 Q1100,312 1120,315" 
        fill="none" stroke="#e07030" stroke-width="2" opacity="0.5"/>
  <path d="M80,350 Q150,348 200,340 Q280,325 340,300 Q400,278 440,272 Q500,268 540,275 Q600,285 650,300 Q700,318 740,330 Q800,345 860,348 Q920,350 960,345 Q1020,338 1060,332 Q1100,328 1120,330" 
        fill="none" stroke="#18bc9c" stroke-width="2" opacity="0.4"/>

  <!-- Legend dots -->
  <circle cx="100" cy="530" r="5" fill="#e07030"/>
  <text x="112" y="534" fill="white" opacity="0.5" font-family="sans-serif" font-size="12">Upper limb (hand)</text>
  <circle cx="300" cy="530" r="5" fill="#18bc9c"/>
  <text x="312" y="534" fill="white" opacity="0.5" font-family="sans-serif" font-size="12">Lower limb (foot)</text>

  <!-- Title text -->
  <text x="80" y="100" fill="white" font-family="serif" font-size="48" font-weight="400" letter-spacing="-0.5">CardioNIR</text>
  <text x="80" y="145" fill="white" opacity="0.6" font-family="sans-serif" font-size="20" font-weight="300">Near-Infrared Spectroscopy in Peripheral Artery Disease</text>

  <!-- KPI badges -->
  <rect x="80" y="180" width="130" height="60" rx="8" fill="white" opacity="0.06"/>
  <text x="145" y="207" text-anchor="middle" fill="white" font-family="serif" font-size="26" font-weight="700">0.91</text>
  <text x="145" y="228" text-anchor="middle" fill="white" opacity="0.45" font-family="sans-serif" font-size="11">AUC-ROC</text>

  <rect x="230" y="180" width="130" height="60" rx="8" fill="white" opacity="0.06"/>
  <text x="295" y="207" text-anchor="middle" fill="white" font-family="serif" font-size="26" font-weight="700">51</text>
  <text x="295" y="228" text-anchor="middle" fill="white" opacity="0.45" font-family="sans-serif" font-size="11">PAD patients</text>

  <rect x="380" y="180" width="130" height="60" rx="8" fill="white" opacity="0.06"/>
  <text x="445" y="207" text-anchor="middle" fill="white" font-family="serif" font-size="26" font-weight="700">0.167</text>
  <text x="445" y="228" text-anchor="middle" fill="white" opacity="0.45" font-family="sans-serif" font-size="11">R² NIRS–ABI</text>

  <!-- Journal tag -->
  <text x="80" y="290" fill="white" opacity="0.35" font-family="monospace" font-size="11" letter-spacing="1.5">MICROVASCULAR RESEARCH · 2025 · OPEN ACCESS</text>

</svg>
